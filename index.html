<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>SOS Robotics Team - RoboCup Rescue League - Building the Future of Rescue Robotics</title>
    <meta name="description" content="SOS Robotics Team competes in RoboCup Rescue League's Rapidly Manufactured Robot Challenge. We build autonomous rescue robots for disaster scenarios." />
    <meta name="keywords" content="robotics, rescue robots, RoboCup, autonomous systems, SOS Robotics, robot competition, rescue technology" />
    <meta name="author" content="SOS Robotics Team" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sosrobotics.team/" />
    <meta property="og:title" content="SOS Robotics Team - RoboCup Rescue League" />
    <meta property="og:description" content="Building the future of rescue robotics through innovation and precision engineering." />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://sosrobotics.team/" />
    <meta property="twitter:title" content="SOS Robotics Team - RoboCup Rescue League" />
    <meta property="twitter:description" content="Building the future of rescue robotics through innovation and precision engineering." />
    <meta property="twitter:image" content="/og-image.jpg" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0e3455" />
    
    <!-- Content Security Policy -->
    <!-- Note: CSP is ONLY set via .htaccess HTTP headers in production to avoid conflicts with Vite dev server -->
    <!-- Security headers (X-Frame-Options, X-Content-Type-Options, etc.) are also set via HTTP headers in .htaccess for production -->
    <!-- Meta tags for these headers are ignored by browsers and cause warnings -->
    <!-- In development, no CSP restrictions are applied to allow Vite HMR and dev server to work properly -->
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Hreflang tags for multi-language support -->
    <link rel="alternate" hreflang="en" href="https://sosrobotics.team/" />
    <link rel="alternate" hreflang="hu" href="https://sosrobotics.team/" />
    <link rel="alternate" hreflang="de" href="https://sosrobotics.team/" />
    <link rel="alternate" hreflang="x-default" href="https://sosrobotics.team/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
